<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Anyview">
  <!-- ink tile so the mark stays legible on any browser-tab color -->
  <rect width="32" height="32" rx="7" fill="#1a1813"/>
  <!-- a faint page peeking behind, kept light so it survives 16px -->
  <rect x="6.5" y="6" width="13" height="15" rx="3" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
  <!-- the amber viewer card -->
  <rect x="10" y="8.5" width="15.5" height="16.5" rx="4" fill="#E6A23A"/>
  <!-- document lines in ink -->
  <rect x="13" y="13" width="9" height="1.9" rx="0.95" fill="#1a1813" opacity="0.85"/>
  <rect x="13" y="16.4" width="9" height="1.9" rx="0.95" fill="#1a1813" opacity="0.85"/>
  <rect x="13" y="19.8" width="5.6" height="1.9" rx="0.95" fill="#1a1813" opacity="0.85"/>
</svg>
